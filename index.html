<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto AR - El Restaurador</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-magenta: #ff00ff; --gold: #ffcc00; --dark-bg: #0a0b1e; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; overflow-x: hidden; background: radial-gradient(circle at center, #1a1b3a 0%, #0a0b1e 100%); }
        .main-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; padding: 20px; box-sizing: border-box; }
        #landing-section { text-align: center; }
        #landing-section h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; background: linear-gradient(to right, var(--neon-blue), var(--neon-magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4)); margin-bottom: 5px; }
        
        /* Contenedor para los botones de inicio */
        .botones-inicio { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        
        .btn-connect { padding: 15px 35px; font-family: 'Orbitron', sans-serif; background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); cursor: pointer; font-size: 1.1rem; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: 0.3s; }
        .btn-connect:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 30px var(--neon-blue); }
        
        /* Estilo variante para el bot√≥n de login */
        .btn-login { border-color: var(--neon-magenta); color: var(--neon-magenta); }
        .btn-login:hover { background: var(--neon-magenta); box-shadow: 0 0 30px var(--neon-magenta); }

        #selection-section { display: none; width: 100%; max-width: 1200px; text-align: center; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; margin-top: 30px; }
        .char-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 25px; cursor: pointer; transition: 0.4s; display: flex; flex-direction: column; align-items: center; }
        .char-card:hover { transform: translateY(-10px); border-color: var(--neon-magenta); box-shadow: 0 10px 30px rgba(255, 0, 255, 0.2); }
        .emoji-avatar { font-size: 70px; margin-bottom: 15px; }
        h3 { font-family: 'Orbitron', sans-serif; color: var(--gold); margin: 10px 0; font-size: 1.4rem; }
        @media (max-width: 900px) { .char-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="landing-section">
            <h1>PROYECTO AR</h1>
            <div class="botones-inicio">
                <button class="btn-connect" onclick="irASeleccion()">NUEVO REGISTRO</button>
                <button class="btn-connect btn-login" onclick="iniciarSesion()">CONTINUAR PARTIDA</button>
            </div>
        </div>

        <div id="selection-section">
            <h2 style="font-family: 'Orbitron'; color: var(--gold);">ELIGE TU IDENTIDAD</h2>
            <div class="char-grid">
                <div class="char-card" onclick="crearYEntrar('Ori√≥n', 'ūü¶Ļ‚Äć‚ôÄÔłŹ‚Äč')">
                    <div class="emoji-avatar">ūü¶Ļ‚Äć‚ôÄÔłŹ‚Äč</div>
                    <h3>ORI√ďN</h3>
                    <p>Explorador t√°ctico.</p>
                </div>
                <div class="char-card" onclick="crearYEntrar('Aurelio', 'ūüĎī')">
                    <div class="emoji-avatar">ūüĎī</div>
                    <h3>AURELIO</h3>
                    <p>Guardi√°n del saber.</p>
                </div>
                <div class="char-card" onclick="crearYEntrar('Luna', 'ūüßô‚Äć‚ôÄÔłŹ')">
                    <div class="emoji-avatar">ūüßô‚Äć‚ôÄÔłŹ</div>
                    <h3>LUNA</h3>
                    <p>Maestra de portales.</p>
                </div>
                <div class="char-card" onclick="crearYEntrar('Nova', 'ūüĎ©‚ÄćūüĒ¨')">
                    <div class="emoji-avatar">ūüĎ©‚ÄćūüĒ¨</div>
                    <h3>NOVA</h3>
                    <p>Investigadora incansable.</p>
                </div>
                <div class="char-card" onclick="crearYEntrar('Atlas', 'ūüßĎ‚ÄćūüöÄ')">
                    <div class="emoji-avatar">ūüßĎ‚ÄćūüöÄ</div>
                    <h3>ATLAS</h3>
                    <p>Viajero dimensional.</p>
                </div>
                <div class="char-card" onclick="crearYEntrar('Sombra', 'ūüē∂ÔłŹ')">
                    <div class="emoji-avatar">ūüē∂ÔłŹ</div>
                    <h3>MAESTRO ORIENTADOR</h3>
                    <p>Maestro del sigilo.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script> 

    <script>
        function irASeleccion() {
            document.getElementById('landing-section').style.display = 'none';
            document.getElementById('selection-section').style.display = 'block';
        }

        // --- NUEVA FUNCI√ďN: INICIAR SESI√ďN (LOGIN) ---
        async function iniciarSesion() {
            let nombreInput = prompt("Ingresa tu nombre de Restaurador para continuar:", "");
            
            if (!nombreInput || nombreInput.trim() === "") {
                return; // Si cancela o deja vac√≠o, no hace nada
            }

            const nombre = nombreInput.trim();

            try {
                // Buscamos si existe alguien con ese nombre
                const snapshot = await db.ref('usuarios').orderByChild('nombre').equalTo(nombre).once('value');
                
                if (snapshot.exists()) {
                    let idUsuario = "";
                    // Firebase devuelve un objeto con resultados, sacamos la key (que es el ID: REST-12345...)
                    snapshot.forEach((childSnapshot) => {
                        idUsuario = childSnapshot.key;
                    });
                    
                    alert("¬°Bienvenido de vuelta, " + nombre + "!");
                    // Redirigimos al laberinto con su ID existente para recuperar el progreso
                    window.location.href = "laberinto.html?id=" + idUsuario;
                } else {
                    alert("No encontramos ning√ļn Restaurador con el nombre '" + nombre + "'. ¬ŅSeguro que lo escribiste bien o prefieres hacer un Nuevo Registro?");
                }
            } catch (error) {
                console.error("Error al iniciar sesi√≥n:", error);
                alert("Las hadas de la red est√°n distra√≠das. Int√©ntalo de nuevo.");
            }
        }

        // --- FUNCI√ďN EXISTENTE: CREAR USUARIO (REGISTRO) ---
        async function crearYEntrar(personaje, emoji) {
            let nombreInput = prompt("¬ŅCu√°l es tu nombre de Restaurador?", "");
            
            if (!nombreInput || nombreInput.trim() === "") {
                alert("¬°Un Restaurador necesita un nombre para ser recordado en las leyendas!");
                return;
            }

            const nombre = nombreInput.trim();

            try {
                const snapshot = await db.ref('usuarios').orderByChild('nombre').equalTo(nombre).once('value');
                
                if (snapshot.exists()) {
                    alert("‚ö†ÔłŹ Este nombre ya ha sido reclamado por otro Restaurador. ¬°Elige uno que sea √ļnico en el bosque!");
                    return; 
                }

                const urlParams = new URLSearchParams(window.location.search);
                let idUsuario = urlParams.get('id');
                if (!idUsuario) {
                    idUsuario = 'REST-' + Date.now(); 
                }

                db.ref('usuarios/' + idUsuario).set({
                    nombre: nombre,
                    personaje: personaje, 
                    emoji: emoji,         
                    nivel: 1,             
                    monedas: 0,           
                    timestamp: Date.now(),
                    completado: false,
                    estado_mision: "espera" 
                }).then(() => {
                    window.location.href = "laberinto.html?id=" + idUsuario;
                });

            } catch (error) {
                console.error("Error al validar nombre:", error);
                alert("Las hadas de la red est√°n distra√≠das. Int√©ntalo de nuevo.");
            }
        }
    </script>
</body>
</html>
