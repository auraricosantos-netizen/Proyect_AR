<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Biblioteca Arcana - Restauradores</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@400;600&display=swap');
        
        body { margin: 0; overflow: hidden; font-family: 'Quicksand', sans-serif; background: #050510; }

        /* HUD Místico */
        #magic-panel {
            position: fixed; top: 0; right: 0; width: 380px; height: 100%;
            background: rgba(10, 10, 25, 0.9); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center;
            padding: 40px; box-sizing: border-box; z-index: 100;
            border-left: 3px solid #ffd700; color: #e0e0e0;
        }

        .tag { color: #ffd700; font-family: 'Cinzel'; font-size: 0.8em; letter-spacing: 2px; }
        h1 { font-family: 'Cinzel'; margin: 10px 0; color: #fff; font-size: 1.8em; text-shadow: 0 0 10px #ffd700; }
        p { line-height: 1.5; font-size: 1em; color: #bbb; }

        #frase-final {
            margin-top: 20px; padding: 15px; border: 1px solid #ffd700;
            background: rgba(255, 215, 0, 0.05); border-radius: 10px;
            display: none; animation: glow 2s infinite alternate;
        }

        /* Controles */
        .controls { position: fixed; bottom: 30px; left: 30px; display: flex; gap: 15px; z-index: 200; }
        button {
            padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-family: 'Quicksand';
        }
        .btn-nav { background: #16213e; color: white; border: 1px solid #ffd700; }
        .btn-nav:disabled { opacity: 0.2; }
        .btn-finish { background: #ffd700; color: #000; display: none; box-shadow: 0 0 20px #ffd700; }

        @keyframes glow { from { box-shadow: 0 0 5px #ffd700; } to { box-shadow: 0 0 20px #ffd700; } }

        @media (max-width: 800px) {
            #magic-panel { width: 100%; height: 38%; top: auto; bottom: 0; padding: 20px; border-left: none; border-top: 3px solid #ffd700; }
            .controls { bottom: 40%; left: 50%; transform: translateX(-50%); width: 95%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="magic-panel">
        <div class="tag" id="label-cat">RELIQUIA</div>
        <h1 id="label-nom">CARGANDO...</h1>
        <p id="label-desc">...</p>
        
        <div id="frase-final">
            <small style="color:#ffd700">📜 LA FRASE CLAVE ES:</small><br>
            <strong style="font-size: 1.2em;">"El conocimiento es la única magia que permanece."</strong>
        </div>
    </div>

    <div class="controls">
        <button id="btn-prev" class="btn-nav" onclick="mover(-1)">ANTERIOR</button>
        <button id="btn-next" class="btn-nav" onclick="mover(1)">SIGUIENTE</button>
        <button id="btn-finish" class="btn-finish" onclick="finalizar()">CONCLUIR INVESTIGACIÓN</button>
    </div>

    <a-scene background="color: #050510">
        <a-light type="ambient" intensity="0.5"></a-light>
        <a-light type="point" position="0 5 -3" intensity="1" color="#ffd700"></a-light>

        <a-plane rotation="-90 0 0" width="100" height="100" color="#222"></a-plane>
        <a-grid position="0 0.01 0" rotation="-90 0 0" width="100" height="100" opacity="0.1" color="#ffd700"></a-grid>

        <a-box position="0 0.4 -4" width="1.5" height="0.8" depth="1.5" color="#111" metalness="0.8"></a-box>

        <a-entity id="main-display" position="0 1.8 -4"></a-entity>

        <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>
    </a-scene>

    <script>
        const objetos = [
            /* Mantenemos todas tus figuras originales */
            { cat: "Historia", nom: "Pergamino del Ayer", desc: "Contiene las crónicas de los antiguos restauradores.", html: `<a-cylinder radius="0.1" height="0.8" color="#d4a373" rotation="0 0 90"></a-cylinder>` },
            { cat: "Alquimia", nom: "Frasco de Esencia", desc: "Fluido cian que otorga claridad mental instantánea.", html: `<a-sphere radius="0.3" color="#00f2ff" opacity="0.7"></a-sphere><a-cylinder radius="0.1" height="0.4" position="0 0.3 0" color="#eee"></a-cylinder>` },
            { cat: "Lógica", nom: "Cristal Prismático", desc: "Refracta la verdad a través de sus caras geométricas.", html: `<a-octahedron radius="0.5" color="white" material="opacity:0.8; transparent:true"></a-octahedron>` },
            { cat: "Escritura", nom: "Pluma de Oro", desc: "Escribe por sí sola cuando detecta una idea brillante.", html: `<a-cone radius-bottom="0.05" height="0.7" color="#ffd700" rotation="20 0 0"></a-cone>` },
            { cat: "Viaje", nom: "Brújula Astral", desc: "No señala el norte, señala el siguiente paso en tu aprendizaje.", html: `<a-torus radius="0.4" radius-tubular="0.05" color="#c0c0c0"></a-torus><a-box width="0.6" height="0.02" depth="0.05" color="red"></a-box>` },
            { cat: "Poder", nom: "Vela Eterna", desc: "Su llama nunca se apaga mientras haya alguien queriendo aprender.", html: `<a-cylinder radius="0.15" height="0.5" color="#fff"></a-cylinder><a-sphere radius="0.1" position="0 0.3 0" color="orange"></a-sphere>` },
            { cat: "Misterio", nom: "Ojo del Oráculo", desc: "Una gema que permite ver los hilos que unen todas las materias.", html: `<a-sphere radius="0.4" color="#9c27b0" material="wireframe:true"></a-sphere><a-sphere radius="0.1" color="white"></a-sphere>` },
            { cat: "Naturaleza", nom: "Semilla de Sabiduría", desc: "Una pequeña semilla que crece con cada libro leído.", html: `<a-sphere radius="0.2" color="#4caf50" scale="0.8 1.2 0.8"></a-sphere>` },
            
            /* Nueva Sección: ARloopa */
            { 
                cat: "Exploración AR", 
                nom: "ARloopa", 
                desc: "Descubre y aprende con ARloopa: Una ventana tecnológica que transforma tu entorno en un laboratorio de conocimiento infinito. ¡Explora lo invisible y haz que la curiosidad sea la llave para superar la ficción!", 
                html: `<a-entity scale="1.2 1.2 1.2">
                        <a-torus radius="0.4" radius-tubular="0.04" color="#00f2ff"></a-torus>
                        <a-circle radius="0.4" material="opacity: 0.3; transparent: true; color: #add8e6"></a-circle>
                        <a-cylinder position="0 -0.8 0" radius="0.06" height="0.7" color="#444"></a-cylinder>
                       </a-entity>` 
            },

            /* Nueva Sección: AR ANATOMY */
            

            /* Gran Final */
            { 
                cat: "EL CORAZÓN DEL SABER", 
                nom: "EL LIBRO INFINITO", 
                desc: "El objeto más importante. Aquí reside todo el conocimiento restaurado. Al abrirse, todas las reliquias danzan a su alrededor.", 
                html: `<a-box width="0.8" height="1.1" depth="0.2" color="#4a0e0e"><a-box width="0.75" height="1" depth="0.1" position="0 0 0.1" color="#fff"></a-box></a-box>` 
            }
        ];

        let idx = 0;
        const display = document.getElementById('main-display');

        function actualizar() {
            const item = objetos[idx];
            document.getElementById('label-cat').innerText = item.cat;
            document.getElementById('label-nom').innerText = item.nom;
            document.getElementById('label-desc').innerText = item.desc;

            display.innerHTML = ""; 

            if (idx === objetos.length - 1) {
                display.innerHTML = item.html; 
                display.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear');

                // Órbitas de TODOS los objetos anteriores (incluyendo los nuevos)
                objetos.forEach((obj, i) => {
                    if (i < objetos.length - 1) {
                        let orbit = document.createElement('a-entity');
                        orbit.setAttribute('rotation', `0 ${i * (360 / (objetos.length - 1))} 0`);
                        orbit.innerHTML = `<a-entity position="2.2 ${Math.sin(i)*0.4} 0" scale="0.35 0.35 0.35">${obj.html}</a-entity>`;
                        display.appendChild(orbit);
                    }
                });

                document.getElementById('btn-next').style.display = "none";
                document.getElementById('btn-finish').style.display = "block";
                document.getElementById('frase-final').style.display = "block";
            } else {
                display.innerHTML = item.html;
                display.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear');
                document.getElementById('btn-next').style.display = "block";
                document.getElementById('btn-finish').style.display = "none";
                document.getElementById('frase-final').style.display = "none";
            }

            document.getElementById('btn-prev').disabled = (idx === 0);
        }

        function mover(dir) {
            idx += dir;
            actualizar();
        }

        // --- ARREGLO DE CARGA INICIAL ---
        window.onload = () => {
            // Un pequeño retraso para asegurar que el motor A-Frame esté listo
            setTimeout(actualizar, 150);
        };

        function finalizar() {
            if(typeof userId !== 'undefined' && userId) {
                db.ref('usuarios/' + userId).update({ 
                    nivel: 9, 
                    monedas: firebase.database.ServerValue.increment(10), 
                    estado_mision: "recompensa" 
                }).then(() => {
                    alert("¡RESTAURACIÓN TOTAL COMPLETADA! Eres un Maestro de la Realidad. ¡Has ganado 10 monedas! 🪙");
                    window.location.href = 'laberinto.html?id=' + userId;
                });
            } else {
                window.location.href = 'laberinto.html';
            }
        }
    </script>
</body>
</html>
