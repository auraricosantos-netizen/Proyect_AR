    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@500;700&display=swap');
        
        body {
            margin: 0; background: radial-gradient(circle, #1a1a2e 0%, #050510 100%);
            color: #333; font-family: 'Quicksand', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .pergamino {
            background: #fdf5e6; width: 90%; max-width: 650px; padding: 40px;
            border: 12px double #8b4513; border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(139,69,19,0.1);
            position: relative; animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-family: 'Cinzel', serif; color: #5d4037; text-align: center; border-bottom: 2px solid #8b4513; padding-bottom: 10px; }

        #question-text { font-size: 1.3rem; font-weight: 700; color: #2e4c2e; margin: 20px 0; text-align: center; }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }

        .option-btn {
            background: #fff; border: 2px solid #8b4513; padding: 15px;
            border-radius: 8px; cursor: pointer; font-family: 'Quicksand';
            font-size: 1rem; font-weight: 700; transition: 0.3s; color: #5d4037;
        }
        .option-btn:hover { background: #efe0cc; transform: scale(1.02); }

        /* Estilo de Pistas */
        #pista-container {
            margin-top: 25px; padding: 15px; background: #fff3e0;
            border-left: 5px solid #ff9800; border-radius: 4px;
            display: none; animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .pista-titulo { font-weight: bold; color: #e65100; font-size: 0.9rem; margin-bottom: 5px; }
        .pista-texto { font-style: italic; color: #5d4037; }

        .progress-bar { text-align: center; font-size: 0.9rem; color: #8b4513; margin-bottom: 10px; font-weight: bold; }

        #resultado-final { text-align: center; display: none; }
        .btn-final {
            background: #2e7d32; color: white; padding: 15px 30px;
            border: none; border-radius: 5px; font-family: 'Cinzel';
            font-size: 1.2rem; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>

        let preguntasPartida = [];
        let indexActual = 0;
        let score = 0;
        let hintIndex = 0;
        let errorCounter = 0;

        function iniciar() {
            // 1. Barajar el pool y elegir 10 que no se repitan
            const shuffled = [...poolPreguntas].sort(() => 0.5 - Math.random());
            preguntasPartida = shuffled.slice(0, 10);
            mostrarPregunta();
        }

        function mostrarPregunta() {
            const data = preguntasPartida[indexActual];
            document.getElementById("current-q-num").innerText = indexActual + 1;
            document.getElementById("question-text").innerText = data.q;
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            document.getElementById("pista-container").style.display = "none";
            
            errorCounter = 0;
            hintIndex = 0;

            // Barajar opciones
            const ops = [...data.ops].sort(() => 0.5 - Math.random());
            
            ops.forEach(o => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = o;
                btn.onclick = () => validarRespuesta(o);
                container.appendChild(btn);
            });
        }

        function validarRespuesta(opcion) {
            const data = preguntasPartida[indexActual];
            
            if (opcion === data.a) {
                score++;
                siguientePregunta();
            } else {
                errorCounter++;
                alert("Respuesta incorrecta. ¡Inténtalo de nuevo!");
                
                // Lógica de pistas
                if (errorCounter >= 2) {
                    mostrarPista();
                }
            }
        }

        function mostrarPista() {
            const data = preguntasPartida[indexActual];
            const container = document.getElementById("pista-container");
            const texto = document.getElementById("pista-texto");
            const contador = document.getElementById("pista-count");

            container.style.display = "block";
            texto.innerText = data.p[hintIndex];
            contador.innerText = hintIndex + 1;

            // Si ya se mostró una pista y falló 2 veces más, avanzar a la siguiente pista
            if (errorCounter > 2 && (errorCounter % 2 === 0)) {
                if (hintIndex < 4) {
                    hintIndex++;
                    texto.innerText = data.p[hintIndex];
                    contador.innerText = hintIndex + 1;
                }
            }
        }

        function siguientePregunta() {
            indexActual++;
            if (indexActual < 10) {
                mostrarPregunta();
            } else {
                mostrarFinal();
            }
        }

        function mostrarFinal() {
            document.getElementById("quiz-ui").style.display = "none";
            document.getElementById("resultado-final").style.display = "block";
            document.getElementById("score-texto").innerText = `Calificación: ${score} / 10`;
            
            let msg = score >= 7 ? "¡Excelente trabajo, Gran Restaurador!" : "Debes seguir estudiando los secretos del bosque.";
            document.getElementById("feedback-final").innerText = msg;
        }

       function irAVictoria() {
    if(typeof db !== 'undefined' && typeof userId !== 'undefined') {
        db.ref('usuarios/' + userId).update({
            nivel: 11,
            estado_mision: "recompensa", 
            monedas: firebase.database.ServerValue.increment(10), 
            nota_final: score,
            // GUARDAMOS LA HORA EXACTA DE LLEGADA
            fecha_fin: firebase.database.ServerValue.TIMESTAMP 
        }).then(() => { 
            window.location.href = 'victoria.html?id=' + userId; 
        });
    } else {
        window.location.href = 'victoria.html';
    }
}
