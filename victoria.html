<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Salón de la Fama - Restauradores</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;700&display=swap');
        
        body {
            margin: 0; background: #050510; color: white;
            font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px; background-image: radial-gradient(circle at center, #1a1b3a 0%, #050510 100%);
        }

        .victoria-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 2px solid #ffd700; border-radius: 20px;
            padding: 40px; width: 95%; max-width: 700px;
            text-align: center; box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            margin-top: 50px; animation: slideUp 1s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-family: 'Cinzel', serif; color: #ffd700; font-size: 2.5rem; margin-bottom: 10px; }
        
        .ranking-table {
            width: 100%; border-collapse: collapse; margin-top: 30px;
            background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden;
        }

        .ranking-table th { background: #ffd700; color: #050510; padding: 15px; font-family: 'Cinzel'; }
        .ranking-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        
        /* Resaltado para el usuario actual */
        .highlight { background: rgba(255, 215, 0, 0.2) !important; color: #ffd700; }

        .btn-reset {
            background: #8b0000; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; margin-top: 40px; font-family: 'Cinzel';
            opacity: 0.6; transition: 0.3s;
        }
        .btn-reset:hover { opacity: 1; transform: scale(1.05); }

        .emoji-mini { font-size: 1.5rem; vertical-align: middle; margin-right: 8px; }
    </style>
</head>
<body>

    <div class="victoria-card">
        <h1>🏆 Salón de la Fama 🏆</h1>
        <p>Los Restauradores que han devuelto el equilibrio al bosque.</p>

        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Rango</th>
                    <th>Restaurador</th>
                    <th>Maestría</th>
                    <th>Tesoro</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                </tbody>
        </table>

        <button class="btn-reset" onclick="finalizarYBorrar()">🔥 DISOLVER VÍNCULO Y SALIR</button>
    </div>

    <script>
    // 1. Obtener el ID del usuario (asegúrate de que userId esté disponible)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    function cargarRanking() {
    // 1. Consultamos por 'fecha_fin' (orden cronológico)
    // limitToFirst(15) trae a los 15 que llegaron primero
    db.ref('usuarios')
      .orderByChild('fecha_fin')
      .limitToFirst(15) 
      .on('value', snap => {
        const body = document.getElementById('ranking-body');
        body.innerHTML = "";
        
        let usuarios = [];
        snap.forEach(child => {
            const data = child.val();
            // Solo incluimos a los que ya tienen fecha de fin registrada
            if (data.fecha_fin) {
                usuarios.push({ id: child.key, ...data });
            }
        });

        // No hace falta .reverse() porque queremos que el menor tiempo (el primero) esté arriba
        usuarios.forEach((user, i) => {
            const row = document.createElement('tr');
            
            // 2. RESALTADO: Si el ID coincide con el usuario actual
            if (user.id === userId) {
                row.className = "highlight";
            }
            
            row.innerHTML = `
                <td>${i + 1}°</td>
                <td>
                    <span class="emoji-mini">${user.emoji || '🧙‍♂️'}</span> 
                    ${user.nombre} ${user.id === userId ? "<strong>(TÚ)</strong>" : ""}
                </td>
                <td>${user.nota_final || 0} / 10</td>
                <td style="color: #ffd700;">${user.monedas || 0} 🪙</td>
            `;
            body.appendChild(row);
        });
    });
}

    function finalizarYBorrar() {
        // Usamos el alert "mágico" que definiste en tu config si quieres, o el confirm normal
        if (confirm("¿Estás seguro de que deseas disolver tu vínculo? Tu progreso se borrará para siempre.")) {
            if (userId && userId !== 'invitado') {
                db.ref('usuarios/' + userId).remove().then(() => {
                    window.location.href = 'index.html';
                });
            } else {
                window.location.href = 'index.html';
            }
        }
    }

    window.onload = () => {
        // Pequeña espera para asegurar que Firebase cargó
        setTimeout(cargarRanking, 500);
    };
</script>
</body>
</html>
