<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Salón de la Fama - Restauradores</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="firebase-config.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;700&display=swap');
        
        body {
            margin: 0; background: #050510; color: white;
            font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: 20px; background-image: radial-gradient(circle at center, #1a1b3a 0%, #050510 100%);
        }

        .victoria-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 2px solid #ffd700; border-radius: 20px;
            padding: 40px; width: 95%; max-width: 700px;
            text-align: center; box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            margin-top: 50px; animation: slideUp 1s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-family: 'Cinzel', serif; color: #ffd700; font-size: 2.5rem; margin-bottom: 10px; }
        
        .ranking-table {
            width: 100%; border-collapse: collapse; margin-top: 30px;
            background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden;
        }

        .ranking-table th { background: #ffd700; color: #050510; padding: 15px; font-family: 'Cinzel'; }
        .ranking-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        
        .highlight { background: rgba(255, 215, 0, 0.3) !important; color: #ffd700; border-left: 5px solid #ffd700; }

        .btn-reset {
            background: #2e7d32; color: white; border: none; padding: 15px 30px;
            border-radius: 50px; cursor: pointer; margin-top: 40px; font-family: 'Cinzel';
            font-weight: bold; transition: 0.3s;
        }
        .btn-reset:hover { background: #1b5e20; transform: scale(1.05); box-shadow: 0 0 20px #2e7d32; }

        .emoji-mini { font-size: 1.5rem; vertical-align: middle; margin-right: 8px; }
    </style>
</head>
<body>

    <div class="victoria-card">
        <h1>🏆 Salón de la Fama 🏆</h1>
        <p>Restauradores que han completado la odisea por orden de llegada.</p>

        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Lugar</th>
                    <th>Restaurador</th>
                    <th>Maestría</th>
                    <th>Tesoro</th>
                </tr>
            </thead>
            <tbody id="ranking-body">
                <tr><td colspan="4">Consultando el pergamino sagrado...</td></tr>
            </tbody>
        </table>

        <button class="btn-reset" onclick="finalizarYBorrar()">🏠 VOLVER AL INICIO</button>
    </div>

    <script>
        // Nota: userId ya viene definido desde firebase-config.js globalmente

        function cargarRanking() {
            // Usamos 'db' que ya está inicializada en tu firebase-config.js
            db.ref('usuarios').on('value', snap => {
                const body = document.getElementById('ranking-body');
                body.innerHTML = "";
                
                let ganadores = [];
                
                snap.forEach(child => {
                    const d = child.val();
                    // Filtro flexible: acepta completado, recompensa o nivel alto
                    if (d.estado_mision === "completado" || d.estado_mision === "recompensa" || d.nivel > 10) {
                        ganadores.push({ id: child.key, ...d });
                    }
                });

                // ORDENAR POR TIEMPO REAL
                ganadores.sort((a, b) => {
                    // Convertimos a número. Si es el texto "ServerValue.TIMESTAMP", Number dará NaN
                    let tiempoA = Number(a.fecha_fin);
                    let tiempoB = Number(b.fecha_fin);

                    // Si uno es NaN (dato corrupto), lo mandamos al final
                    if (isNaN(tiempoA)) return 1;
                    if (isNaN(tiempoB)) return -1;

                    return tiempoA - tiempoB; // Menor tiempo (llegó antes) va primero
                });

                // Mostrar los 10 mejores
                ganadores.slice(0, 10).forEach((user, i) => {
                    const row = document.createElement('tr');
                    
                    // Resaltar si el ID coincide con el que traemos por URL
                    if (user.id === userId) row.className = "highlight";
                    
                    row.innerHTML = `
                        <td>${i + 1}°</td>
                        <td>
                            <span class="emoji-mini">${user.emoji || '🧙‍♂️'}</span> 
                            ${user.nombre || 'Anónimo'} ${user.id === userId ? "<strong>(TÚ)</strong>" : ""}
                        </td>
                        <td>${user.nota_final || 0} / 10</td>
                        <td style="color: #ffd700;">${user.monedas || 0} 🪙</td>
                    `;
                    body.appendChild(row);
                });

                if (ganadores.length === 0) {
                    body.innerHTML = "<tr><td colspan='4'>Aún no hay leyendas en este bosque.</td></tr>";
                }
            });
        }

        async function finalizarYBorrar() {
    // Explicamos al usuario que esto libera su nombre para volver a jugar
    if (confirm("¿Estás seguro de que deseas disolver tu vínculo? Tu nombre quedará libre para una nueva partida y se borrará tu rastro en el chat.")) {
        
        if (userId && userId !== 'invitado') {
            try {
                // 1. Borramos sus mensajes del chat para no dejar basura
                const snapChat = await db.ref('chat_sincronia').orderByChild('userId').equalTo(userId).once('value');
                const updates = {};
                snapChat.forEach(child => {
                    updates[child.key] = null;
                });
                await db.ref('chat_sincronia').update(updates);

                // 2. ¡LO MÁS IMPORTANTE!: Borramos el registro del usuario
                // Al borrarlo aquí, la próxima vez que inicie sesión con el mismo nombre, 
                // NO existirá en nivel 11, sino que se creará de cero en nivel 1.
                await db.ref('usuarios/' + userId).remove();

                console.log("Usuario y chat eliminados. Espacio liberado.");
                
                // 3. Volvemos al inicio
                window.location.href = 'index.html';

            } catch (error) {
                console.error("Error en la limpieza mágica:", error);
                window.location.href = 'index.html';
            }
        } else {
            window.location.href = 'index.html';
        }
    }
}
// Función para reemplazar el confirm nativo con uno con estilo de pergamino
window.confirmarMistico = function(mensaje) {
    return new Promise((resolve) => {
        // Crear el overlay (fondo oscuro)
        const overlay = document.createElement('div');
        overlay.className = 'magic-alert-overlay'; // Reutilizamos tus estilos existentes
        
        overlay.innerHTML = `
            <div class="magic-alert-box">
                <h2>📜 Decisión Trascendental</h2>
                <p>${mensaje}</p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button id="btn-confirm-si" class="magic-alert-btn" style="background: #8b0000;">DISOLVER</button>
                    <button id="btn-confirm-no" class="magic-alert-btn" style="background: #2e4c2e;">PERMANECER</button>
                </div>
            </div>
        `;

        document.body.appendChild(overlay);

        // Animación de entrada
        setTimeout(() => {
            overlay.style.opacity = "1";
            overlay.querySelector('.magic-alert-box').style.transform = "scale(1)";
        }, 10);

        // Lógica de los botones
        overlay.querySelector('#btn-confirm-si').onclick = () => {
            cerrarConfirm(true);
        };

        overlay.querySelector('#btn-confirm-no').onclick = () => {
            cerrarConfirm(false);
        };

        const cerrarConfirm = (resultado) => {
            overlay.style.opacity = "0";
            overlay.querySelector('.magic-alert-box').style.transform = "scale(0.7)";
            setTimeout(() => { 
                overlay.remove(); 
                resolve(resultado); // Retornamos la respuesta
            }, 300);
        };
    });
};
        // Ejecutamos la carga
        window.onload = () => {
            // Damos un momento para que firebase-config.js termine de procesar el userId
            setTimeout(cargarRanking, 600);
        };
    </script>
</body>
</html>
