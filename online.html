<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islas Sincronía - Restauradores</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background: #050510;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 20px);
            background-size: 50px 50px;
            color: white;
            font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .header { margin-top: 15px; text-align: center; width: 90%; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); font-size: 1.5rem; }
        p.subtitle { color: #aaa; font-size: 0.8rem; margin: 5px 0; }

        .main-wrapper {
            display: flex; flex-direction: column; gap: 15px;
            width: 95%; max-width: 1100px;
            margin: 15px 0; padding-bottom: 80px; /* Espacio para el botón inferior */
        }

        /* Responsive Desktop */
        @media (min-width: 800px) {
            h1 { font-size: 2.2rem; }
            .main-wrapper { flex-direction: row; height: 70vh; }
            body { overflow: hidden; }
        }

        .puzzle-section {
            flex: 1; background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        .fragmento-card {
            font-size: 1.2rem; font-weight: bold; color: var(--neon-blue);
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px;
            border: 2px dashed var(--neon-blue); margin: 15px 0;
            width: 80%; box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .chat-section {
            flex: 1.2; background: rgba(0, 0, 0, 0.6);
            border-radius: 20px; border: 1px solid var(--neon-purple);
            display: flex; flex-direction: column; height: 400px; /* Altura fija en móvil */
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
        }

        @media (min-width: 800px) {
            .chat-section { height: auto; }
        }

        #chat-box {
            flex: 1; padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 8px;
            background: linear-gradient(to bottom, transparent, rgba(188, 19, 254, 0.05));
        }

        .mensaje {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px; border-radius: 12px;
            border-left: 3px solid var(--neon-purple);
            font-size: 0.9rem;
            animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
        }

        .input-area { padding: 10px; background: rgba(255,255,255,0.05); display: flex; gap: 8px; }
        input { 
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--neon-blue); 
            border-radius: 20px; padding: 10px 15px; color: white; outline: none; font-size: 16px; /* Evita zoom en iOS */
        }
        
        button.btn-send { 
            background: var(--neon-blue); color: black; border: none; 
            padding: 0 15px; border-radius: 20px; font-weight: bold; cursor: pointer; 
        }

        .btn-return {
            position: fixed; bottom: 15px; width: 90%; max-width: 400px;
            background: rgba(255,255,255,0.1); border: 1px solid white; color: white;
            padding: 15px; border-radius: 30px; 
            font-family: 'Orbitron'; cursor: pointer; transition: 0.4s;
            opacity: 0.4; pointer-events: none; z-index: 100;
        }

        .success-mode {
            opacity: 1 !important; pointer-events: auto !important;
            background: var(--neon-purple) !important;
            box-shadow: 0 0 25px var(--neon-purple);
            animation: pulse 2s infinite;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>ISLAS SINCRONÍA</h1>
        <p id="user-count" class="subtitle">Conectando...</p>
    </div>

    <div class="main-wrapper">
        <div class="puzzle-section">
            <div id="status-icon" style="font-size: 2.5rem;">🔮</div>
            <h2>Tu Fragmento</h2>
            <div id="mi-fragmento-display" class="fragmento-card">Cargando...</div>
            <p style="font-size: 0.8rem; color: #ddd; padding: 0 10px;">
                Envíen los fragmentos al chat en orden.<br>
                <strong style="color:var(--neon-purple)">¡La repetición rompe el hechizo!</strong>
            </p>
        </div>

        <div class="chat-section">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Tu fragmento..." autocomplete="off" onkeypress="if(event.key==='Enter') enviarMensaje()">
                <button class="btn-send" onclick="enviarMensaje()">➤</button>
            </div>
        </div>
    </div>

    <button id="btn-final" class="btn-return" onclick="finalizarMision()">ESPERANDO SINCRONÍA</button>

    <script>
    window.addEventListener('load', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const finalUserId = urlParams.get('id') || ('invitado_' + Math.floor(Math.random()*1000));
        const miNombre = "Restaurador_" + finalUserId.substring(0, 4);

        const chatRef = db.ref('chat_sincronia');
        const miNodoPresencia = db.ref('presencia_islas/' + finalUserId);
        miNodoPresencia.set(true);
        miNodoPresencia.onDisconnect().remove();
        
        let misDatosMision = { fragmentos: [], pasos: 0 };

        const megaBanco = {
            "2": [
        ["UNIÓN MÁGICA ES", "FUERZA DEL BOSQUE"],
        ["ESPÍRITUS UNIDOS", "UN DESTINO COMPARTIDO"],
        ["LUZ ANCESTRAL", "GUÍA NUESTROS PASOS"],
        ["RESTAURADORES", "EL EQUILIBRIO VUELVE"],
        ["EL BOSQUE", "SIEMPRE RECUERDA"],
        ["PORTAL ABIERTO", "MAGIA FLUYENDO"],
        ["RAÍCES FUERTES", "ALMAS CONECTADAS"],
        ["VIENTO SABIO", "SUSURRO ETERNO"],
        ["SUEÑO MÁGICO", "REALIDAD UNIDA"],
        ["SOMBRAS FUERA", "CLARIDAD INTERIOR"]
    ],
    "3": [
        ["SOLO EN UNIÓN", "LOS RESTAURADORES", "LOGRAN LA PAZ"],
        ["CADA PALABRA", "ES UN HECHIZO", "PARA EL BOSQUE"],
        ["LA MAGIA CRECE", "CUANDO TODOS", "ACTÚAN COMO UNO"],
        ["SOMOS LA VOZ", "DEL ÁRBOL", "DE LA VIDA"],
        ["CORAZÓN DE ROBLE", "MENTE DE AGUA", "ESPÍRITU DE FUEGO"],
        ["EL CAMINO OSCURO", "SE ILUMINA CON", "NUESTRA AMISTAD"],
        ["TRES DESTINOS", "UNA SOLA", "MISIÓN SAGRADA"],
        ["PROTEGE EL REINO", "CON LA FUERZA", "DE LA SINCRONÍA"],
        ["LA NATURALEZA", "ESPERA NUESTRA", "AYUDA DIVINA"],
        ["QUE LA LUZ", "BORRE TODA", "LA OSCURIDAD"]
    ],
    "4": [
        ["CUANDO EL BOSQUE", "SE OSCURECE", "NUESTRA AMISTAD", "ES LA LUZ"],
        ["LA SINCRONÍA", "ES EL LENGUAJE", "DE LAS HADAS", "Y PROTECTORES"],
        ["NADIE SE QUEDA", "ATRÁS EN", "ESTA GRAN", "MISIÓN MÁGICA"],
        ["CUATRO ELEMENTOS", "REUNIDOS PARA", "RESTAURAR EL", "ORDEN PERDIDO"],
        ["LOS ANTIGUOS", "NOS OBSERVAN", "DESDE LAS", "ESTRELLAS GUÍA"],
        ["CONECTA TU", "ESENCIA CON", "EL LATIDO", "DE LA TIERRA"],
        ["EL PODER", "VERDADERO NACE", "DE LA", "CONFIANZA MUTUA"],
        ["QUE NINGUNA", "SOMBRA DIVIDA", "LO QUE LA", "MAGIA UNIÓN"],
        ["RESTAURAR LA", "ESENCIA ES", "TRABAJO DE", "VERDADEROS HÉROES"],
        ["EL EQUILIBRIO", "FINAL ESTÁ", "MUY CERCA", "DE LOGRARSE"]
    ],
    "5": [
        ["LA", "ESENCIA", "DE LA SINCRONÍA", "RESTAURA", "EL CORAZÓN DEL BOSQUE"],
        ["SOLO", "CONECTANDO", "TODAS LAS ALMAS", "DESPERTARÁ", "EL GUARDIÁN DORMIDO"],
        ["CADA", "UNO DE", "NOSOTROS ES", "UNA PIEZA", "DEL ROMPECABEZAS SAGRADO"],
        ["LA", "MAGIA", "MÁS PODEROSA", "ES LA", "QUE SE COMPARTE"],
        ["SI", "TODOS", "CAMINAMOS JUNTOS", "EL", "DESTINO SERÁ NUESTRO"],
        ["BAJO", "LA", "SOMBRA DEL ÁRBOL", "HACEMOS", "NUESTRO JURAMENTO ETERNO"],
        ["SIN", "DUDAS", "EN EL CORAZÓN", "AVANZAMOS", "HACIA LA VICTORIA"],
        ["LA", "LUZ", "DE LOS CINCO", "VENCE", "CUALQUIER MALDICIÓN ANTIGUA"],
        ["EL", "SABIO", "BOSQUE NOS DARÁ", "LAS", "RESPUESTAS QUE BUSCAMOS"],
        ["LA", "PAZ", "FINAL LLEGARÁ", "CON", "NUESTRA TOTAL SINCRONÍA"]
    ],
            "6": [
                ["EN LA UNIÓN", "DE NUESTRAS VOCES", "EL CRISTAL ROTO", "VUELVE A BRILLAR", "MOSTRANDO EL CAMINO", "HACIA EL NEXO"]
            ],
            "7": [
                ["A TRAVÉS DEL TIEMPO", "BUSCAMOS LA ESENCIA", "QUE LE DARÁ VIDA", "A LA PRADERA", "Y DESPERTARÁ", "A LOS GUARDIANES", "DEL REINO"]
            ],
            "8": [
                ["CUANDO EL CIELO", "SE CUBRA DE NIEBLA", "NUESTRA SINCRONÍA", "SERÁ EL FARO", "QUE GUIARÁ", "A LAS ALMAS", "HACIA LA PAZ", "ABSOLUTA"]
            ],
            "9": [
                ["NINGÚN RESTAURADOR", "PUEDE VENCER SOLO", "PERO JUNTOS", "SOMOS LA LLAVE", "QUE ABRE", "LAS PUERTAS", "DE LA PERCEPCIÓN", "Y SANA", "EL COSMOS"]
            ],
            "10": [
                ["EL ARTE", "LA CIENCIA", "Y LA MAGIA", "SE ENTRELAZAN", "EN ESTE LUGAR", "PARA FORMAR", "UN ESCUDO", "QUE PROTEGERÁ", "NUESTRO LEGADO", "POR SIEMPRE"]
            ]
        };

        // Escuchar presencia
        db.ref('presencia_islas').on('value', (snap) => {
            let usuariosOnline = [];
            snap.forEach(child => { usuariosOnline.push(child.key); });
            usuariosOnline.sort(); 
            const count = usuariosOnline.length;
            document.getElementById('user-count').innerText = `RED: ${count} Restauradores en línea`;
            actualizarDificultad(usuariosOnline);
        });

        function actualizarDificultad(usuariosOnline) {
            let num = usuariosOnline.length;
            let dif = Math.min(Math.max(num, 2), 5); // Simplificado para el ejemplo
            const frase = megaBanco[dif][new Date().getDate() % megaBanco[dif].length];
            misDatosMision.fragmentos = frase;
            misDatosMision.pasos = dif;

            let idx = usuariosOnline.indexOf(finalUserId) % dif;
            const colores = ["#00f2ff", "#bc13fe", "#ff0055", "#ccff00", "#00ff99"];
            
            const display = document.getElementById('mi-fragmento-display');
            display.innerText = `"${frase[idx]}"`;
            display.style.color = colores[idx];
            display.style.borderColor = colores[idx];
        }

        // Lógica de historial compartido
        chatRef.limitToLast(50).on('value', (snap) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = "";
            let historial = [];

            snap.forEach(child => {
                const data = child.val();
                historial.push({
                    texto: data.texto.toUpperCase().trim(),
                    userId: data.userId,
                    nombre: data.nombre
                });
                const div = document.createElement('div');
                div.className = "mensaje";
                div.innerHTML = `<small style="color:var(--neon-blue)">${data.nombre}:</small> ${data.texto}`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
            validarSincroniaReal(historial);
        });

        function validarSincroniaReal(historial) {
            let etapa = 0;
            let usuariosInvolucrados = new Set();
            const objetivo = misDatosMision.fragmentos;
            if(!objetivo) return;

            for (let msg of historial) {
                if (msg.texto === objetivo[etapa]) {
                    if (!usuariosInvolucrados.has(msg.userId)) {
                        usuariosInvolucrados.add(msg.userId);
                        etapa++;
                        if (etapa === misDatosMision.pasos) break;
                    } else {
                        etapa = (msg.texto === objetivo[0]) ? 1 : 0;
                        usuariosInvolucrados = (etapa === 1) ? new Set([msg.userId]) : new Set();
                    }
                } else {
                    if (msg.texto === objetivo[0]) {
                        etapa = 1;
                        usuariosInvolucrados = new Set([msg.userId]);
                    } else {
                        etapa = 0;
                        usuariosInvolucrados.clear();
                    }
                }
            }

            const btn = document.getElementById('btn-final');
            if (etapa === misDatosMision.pasos) {
                btn.innerText = "¡SINCRONÍA LOGRADA! VOLVER";
                btn.classList.add('success-mode');
                document.getElementById('status-icon').innerText = "🌟";
                window.misionCompletada = true;
            } else {
                btn.innerText = `PROGRESO: ${etapa}/${misDatosMision.pasos}`;
                btn.classList.remove('success-mode');
                window.misionCompletada = false;
            }
        }

        window.enviarMensaje = function() {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if (!texto) return;

            chatRef.push({
                nombre: miNombre,
                userId: finalUserId,
                texto: texto,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = "";
        };

        window.finalizarMision = function() {
            if (!window.misionCompletada) return;
            db.ref('usuarios/' + finalUserId).update({
                nivel: 6,
                monedas: firebase.database.ServerValue.increment(10),
                estado_mision: "recompensa" 
            }).then(() => {
                window.location.href = 'laberinto.html?id=' + finalUserId;
            });
        };
    });
    </script>
</body>
</html>
