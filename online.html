<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islas Sincronía - Restauradores</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background: #050510;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            color: white;
            font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .header { margin-top: 20px; text-align: center; z-index: 10; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin: 0; }
        p.subtitle { color: #aaa; font-size: 0.9em; margin: 5px 0; }

        .main-wrapper {
            display: flex; flex-direction: row; gap: 20px;
            width: 95%; max-width: 1100px; height: 70vh;
            margin-top: 15px;
        }

        .puzzle-section {
            flex: 1; background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; padding: 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        .fragmento-card {
            font-size: 1.5em; font-weight: bold; color: var(--neon-blue);
            background: rgba(0,0,0,0.4); padding: 25px; border-radius: 15px;
            border: 2px dashed var(--neon-blue); margin: 20px 0;
            box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2);
            transition: all 0.4s ease;
        }

        .chat-section {
            flex: 1; background: rgba(0, 0, 0, 0.6);
            border-radius: 20px; border: 1px solid var(--neon-purple);
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
        }

        #chat-box {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
            background: linear-gradient(to bottom, transparent, rgba(188, 19, 254, 0.05));
        }

        .mensaje {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px; border-radius: 15px;
            border-left: 3px solid var(--neon-purple);
            animation: slideIn 0.3s ease-out;
        }

        .input-area { padding: 15px; background: rgba(255,255,255,0.05); display: flex; gap: 10px; }
        input { flex: 1; background: transparent; border: 1px solid var(--neon-blue); border-radius: 25px; padding: 12px 20px; color: white; outline: none; }
        
        button.btn-send { background: var(--neon-blue); color: black; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        .btn-return {
            margin-top: 20px; background: rgba(255,255,255,0.1); 
            border: 1px solid white; color: white;
            padding: 12px 40px; border-radius: 30px; 
            font-family: 'Orbitron'; cursor: pointer; transition: 0.4s;
            opacity: 0.4; pointer-events: none;
        }

        .success-mode {
            opacity: 1 !important; pointer-events: auto !important;
            background: var(--neon-purple) !important;
            border-color: var(--neon-blue) !important;
            box-shadow: 0 0 25px var(--neon-purple);
            animation: pulse 2s infinite;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        @media (max-width: 800px) {
            .main-wrapper { flex-direction: column; height: auto; overflow-y: auto; }
            .chat-section { height: 350px; }
            .fragmento-card { font-size: 1.1em; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ISLAS SINCRONÍA</h1>
        <p id="user-count" class="subtitle">Conectando con el tejido mágico...</p>
    </div>

    <div class="main-wrapper">
        <div class="puzzle-section">
            <div id="status-icon" style="font-size: 3em;">🔮</div>
            <h2>Tu Fragmento Sagrado</h2>
            <div id="mi-fragmento-display" class="fragmento-card">Leyendo el cosmos...</div>
            <p id="instruccion-guia" style="font-size: 0.9em; color: #ddd;">
                Para avanzar, envíen sus fragmentos al chat en el orden correcto.<br>
                <strong style="color:var(--neon-purple)">Si alguien se equivoca o repite, la magia se rompe.</strong>
            </p>
        </div>

        <div class="chat-section">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Escribe tu fragmento aquí..." autocomplete="off" onkeypress="if(event.key==='Enter') enviarMensaje()">
                <button class="btn-send" onclick="enviarMensaje()">ENVIAR</button>
            </div>
        </div>
    </div>

    <button id="btn-final" class="btn-return" onclick="finalizarMision()">ESPERANDO SINCRONÍA</button>

    <script>
    window.addEventListener('load', () => {
        
        const urlParams = new URLSearchParams(window.location.search);
        const finalUserId = (typeof userId !== 'undefined' ? userId : null) || urlParams.get('id') || ('invitado_' + Math.floor(Math.random()*1000));
        const miNombre = "Restaurador_" + finalUserId.substring(0, 4);

        const chatRef = db.ref('chat_sincronia');
        
        // Usamos el ID del usuario como llave para saber exactamente quiénes y cuántos están
        const miNodoPresencia = db.ref('presencia_islas/' + finalUserId);
        miNodoPresencia.set(true);
        miNodoPresencia.onDisconnect().remove();
        
        let misDatosMision = { fragmentos: [], pasos: 0 };

        // --- MEGA BANCO TEMÁTICO (DE 2 A 10 USUARIOS) ---
        const megaBanco = {
            "2": [
        ["UNIÓN MÁGICA ES", "FUERZA DEL BOSQUE"],
        ["ESPÍRITUS UNIDOS", "UN DESTINO COMPARTIDO"],
        ["LUZ ANCESTRAL", "GUÍA NUESTROS PASOS"],
        ["RESTAURADORES", "EL EQUILIBRIO VUELVE"],
        ["EL BOSQUE", "SIEMPRE RECUERDA"],
        ["PORTAL ABIERTO", "MAGIA FLUYENDO"],
        ["RAÍCES FUERTES", "ALMAS CONECTADAS"],
        ["VIENTO SABIO", "SUSURRO ETERNO"],
        ["SUEÑO MÁGICO", "REALIDAD UNIDA"],
        ["SOMBRAS FUERA", "CLARIDAD INTERIOR"]
    ],
    "3": [
        ["SOLO EN UNIÓN", "LOS RESTAURADORES", "LOGRAN LA PAZ"],
        ["CADA PALABRA", "ES UN HECHIZO", "PARA EL BOSQUE"],
        ["LA MAGIA CRECE", "CUANDO TODOS", "ACTÚAN COMO UNO"],
        ["SOMOS LA VOZ", "DEL ÁRBOL", "DE LA VIDA"],
        ["CORAZÓN DE ROBLE", "MENTE DE AGUA", "ESPÍRITU DE FUEGO"],
        ["EL CAMINO OSCURO", "SE ILUMINA CON", "NUESTRA AMISTAD"],
        ["TRES DESTINOS", "UNA SOLA", "MISIÓN SAGRADA"],
        ["PROTEGE EL REINO", "CON LA FUERZA", "DE LA SINCRONÍA"],
        ["LA NATURALEZA", "ESPERA NUESTRA", "AYUDA DIVINA"],
        ["QUE LA LUZ", "BORRE TODA", "LA OSCURIDAD"]
    ],
    "4": [
        ["CUANDO EL BOSQUE", "SE OSCURECE", "NUESTRA AMISTAD", "ES LA LUZ"],
        ["LA SINCRONÍA", "ES EL LENGUAJE", "DE LAS HADAS", "Y PROTECTORES"],
        ["NADIE SE QUEDA", "ATRÁS EN", "ESTA GRAN", "MISIÓN MÁGICA"],
        ["CUATRO ELEMENTOS", "REUNIDOS PARA", "RESTAURAR EL", "ORDEN PERDIDO"],
        ["LOS ANTIGUOS", "NOS OBSERVAN", "DESDE LAS", "ESTRELLAS GUÍA"],
        ["CONECTA TU", "ESENCIA CON", "EL LATIDO", "DE LA TIERRA"],
        ["EL PODER", "VERDADERO NACE", "DE LA", "CONFIANZA MUTUA"],
        ["QUE NINGUNA", "SOMBRA DIVIDA", "LO QUE LA", "MAGIA UNIÓN"],
        ["RESTAURAR LA", "ESENCIA ES", "TRABAJO DE", "VERDADEROS HÉROES"],
        ["EL EQUILIBRIO", "FINAL ESTÁ", "MUY CERCA", "DE LOGRARSE"]
    ],
    "5": [
        ["LA", "ESENCIA", "DE LA SINCRONÍA", "RESTAURA", "EL CORAZÓN DEL BOSQUE"],
        ["SOLO", "CONECTANDO", "TODAS LAS ALMAS", "DESPERTARÁ", "EL GUARDIÁN DORMIDO"],
        ["CADA", "UNO DE", "NOSOTROS ES", "UNA PIEZA", "DEL ROMPECABEZAS SAGRADO"],
        ["LA", "MAGIA", "MÁS PODEROSA", "ES LA", "QUE SE COMPARTE"],
        ["SI", "TODOS", "CAMINAMOS JUNTOS", "EL", "DESTINO SERÁ NUESTRO"],
        ["BAJO", "LA", "SOMBRA DEL ÁRBOL", "HACEMOS", "NUESTRO JURAMENTO ETERNO"],
        ["SIN", "DUDAS", "EN EL CORAZÓN", "AVANZAMOS", "HACIA LA VICTORIA"],
        ["LA", "LUZ", "DE LOS CINCO", "VENCE", "CUALQUIER MALDICIÓN ANTIGUA"],
        ["EL", "SABIO", "BOSQUE NOS DARÁ", "LAS", "RESPUESTAS QUE BUSCAMOS"],
        ["LA", "PAZ", "FINAL LLEGARÁ", "CON", "NUESTRA TOTAL SINCRONÍA"]
    ],
            "6": [
                ["EN LA UNIÓN", "DE NUESTRAS VOCES", "EL CRISTAL ROTO", "VUELVE A BRILLAR", "MOSTRANDO EL CAMINO", "HACIA EL NEXO"]
            ],
            "7": [
                ["A TRAVÉS DEL TIEMPO", "BUSCAMOS LA ESENCIA", "QUE LE DARÁ VIDA", "A LA PRADERA", "Y DESPERTARÁ", "A LOS GUARDIANES", "DEL REINO"]
            ],
            "8": [
                ["CUANDO EL CIELO", "SE CUBRA DE NIEBLA", "NUESTRA SINCRONÍA", "SERÁ EL FARO", "QUE GUIARÁ", "A LAS ALMAS", "HACIA LA PAZ", "ABSOLUTA"]
            ],
            "9": [
                ["NINGÚN RESTAURADOR", "PUEDE VENCER SOLO", "PERO JUNTOS", "SOMOS LA LLAVE", "QUE ABRE", "LAS PUERTAS", "DE LA PERCEPCIÓN", "Y SANA", "EL COSMOS"]
            ],
            "10": [
                ["EL ARTE", "LA CIENCIA", "Y LA MAGIA", "SE ENTRELAZAN", "EN ESTE LUGAR", "PARA FORMAR", "UN ESCUDO", "QUE PROTEGERÁ", "NUESTRO LEGADO", "POR SIEMPRE"]
            ]
        };

        // --- SISTEMA DE PRESENCIA Y ASIGNACIÓN PERFECTA ---
        db.ref('presencia_islas').on('value', (snap) => {
            let usuariosOnline = [];
            snap.forEach(child => { usuariosOnline.push(child.key); });
            
            // Ordenamos alfabéticamente los IDs para que la asignación sea estable
            usuariosOnline.sort(); 
            
            const count = usuariosOnline.length;
            const counterEl = document.getElementById('user-count');
            if(counterEl) counterEl.innerText = `RED: ${count} Restauradores en línea`;
            
            actualizarDificultad(usuariosOnline);
        });

        function actualizarDificultad(usuariosOnline) {
            let numeroUsuarios = usuariosOnline.length;
            let dificultad = Math.min(Math.max(numeroUsuarios, 2), 10); // Límite entre 2 y 10
            
            const bancoDelNivel = megaBanco[dificultad];
            const hoy = new Date().getDate();
            const fraseElegida = bancoDelNivel[hoy % bancoDelNivel.length];

            misDatosMision.fragmentos = fraseElegida;
            misDatosMision.pasos = dificultad;

            // Buscamos la posición exacta de este usuario en la lista para darle su parte
            let miIndice = usuariosOnline.indexOf(finalUserId);
            if(miIndice === -1) miIndice = 0; // Backup de seguridad
            
            // Si hay más de 10 usuarios, se repiten los fragmentos (se envuelve el índice)
            miIndice = miIndice % dificultad; 
            
            const colores = ["#00f2ff", "#bc13fe", "#ff0055", "#ccff00", "#00ff99", "#ffcc00", "#ff6600", "#00ccff", "#cc66ff", "#00ff66"];
            
            const display = document.getElementById('mi-fragmento-display');
            if(display) {
                display.innerText = `"${fraseElegida[miIndice]}"`;
                display.style.color = colores[miIndice];
                display.style.borderColor = colores[miIndice];
            }
        }

        // --- LÓGICA ESTRICTA DEL CHAT ---
        // Leemos hasta 30 mensajes para no perder el rastro de la secuencia
        chatRef.limitToLast(30).on('value', (snap) => {
            const chatBox = document.getElementById('chat-box');
            if(!chatBox) return;
            
            chatBox.innerHTML = "";
            let historial = [];

            snap.forEach(child => {
                const data = child.val();
                if(data.texto && data.userId) {
                    historial.push({
                        texto: data.texto.toUpperCase().trim(),
                        userId: data.userId,
                        nombre: data.nombre
                    });
                    const div = document.createElement('div');
                    div.className = "mensaje";
                    div.innerHTML = `<small style="color:var(--neon-blue)">${data.nombre}:</small><br>${data.texto}`;
                    chatBox.appendChild(div);
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
            validarSincroniaReal(historial);
        });

        function validarSincroniaReal(historial) {
            let etapa = 0;
            let usuariosInvolucrados = new Set();
            const objetivo = misDatosMision.fragmentos;
            
            if(!objetivo || objetivo.length === 0) return;

            // Recorremos el historial comprobando la cadena
            for (let i = 0; i < historial.length; i++) {
                let msg = historial[i];
                
                // ¿Es la parte de la frase que toca ahora mismo?
                if (msg.texto === objetivo[etapa]) {
                    // Verificamos que el usuario NO haya participado ya en esta cadena
                    if (!usuariosInvolucrados.has(msg.userId)) {
                        usuariosInvolucrados.add(msg.userId);
                        etapa++;
                        if (etapa === misDatosMision.pasos) break; // ¡Éxito!
                    } else {
                        // El usuario repitió turno y rompió la magia
                        etapa = (msg.texto === objetivo[0]) ? 1 : 0;
                        usuariosInvolucrados = new Set();
                        if (etapa === 1) usuariosInvolucrados.add(msg.userId);
                    }
                } else {
                    // Alguien envió un mensaje equivocado y rompió la cadena
                    if (msg.texto === objetivo[0]) {
                        etapa = 1;
                        usuariosInvolucrados = new Set([msg.userId]);
                    } else {
                        etapa = 0;
                        usuariosInvolucrados.clear();
                    }
                }
            }

            const btn = document.getElementById('btn-final');
            if (etapa === misDatosMision.pasos) {
                btn.innerText = "¡SINFONÍA MÁGICA LOGRADA! VOLVER";
                btn.classList.add('success-mode');
                document.getElementById('status-icon').innerText = "🌟";
                window.misionCompletada = true;
            } else {
                btn.innerText = `FORJANDO SINCRONÍA (${etapa}/${misDatosMision.pasos})`;
                btn.classList.remove('success-mode');
                window.misionCompletada = false;
            }
        }

        window.enviarMensaje = function() {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if (!texto) return;

            // Guardamos el userId para poder verificar que son distintas personas
            chatRef.push({
                nombre: miNombre,
                userId: finalUserId,
                texto: texto,
                timestamp: Date.now()
            });
            input.value = "";
        };

        window.finalizarMision = function() {
            if (!window.misionCompletada) return;
            
            db.ref('usuarios/' + finalUserId).update({
                nivel: 6,
                monedas: firebase.database.ServerValue.increment(10),
                estado_mision: "recompensa" 
            }).then(() => {
                alert("¡El tejido mágico ha sido restaurado! Has ganado 10 monedas.");
                window.location.href = 'laberinto.html?id=' + finalUserId;
            });
        };
    });
    </script>
</body>
</html>
